<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="mainScreen" class="container">
        <div> 
            <h1>My Grocery List</h1>

            <div id="editMode" class="hidden">
                <h2>Edit Mode</h2>
                <p>(Turn Edit Mode off to mark items as bought)</p>
            </div>
    
        </div>
            
        <main class="rows">
            <div class="columns"> 
                <input id="itemToAdd" type="text" class="groceryInput hidden" placeholder="Enter item">
                <input id="itemQty" type="number" min="0" class="groceryInput hidden" placeholder="Qty">
                <textarea id="itemMemo" class="groceryInput hidden" placeholder="Notes"></textarea>
                <button id="addItemBtn" class="groceryInput hidden">➕</button>
                <ul id="firstList"></ul>
            </div>
                    
            <div class="columns-two"> 
                <button id= "showInputBtn" onclick="showInput()">Add Food</button> 
                <button onclick="clearList()">Delete List</button> 
                <button id="editBtn" onclick="toggleEditor()">Edit</button>
            </div>  
        </main>

        <div id="editForm" class="hidden"> 
            <label for="editName">Item Name</label>
            <input id="editName" type="text" placeholder="Enter item" >

            <label for="editQty">Item Qty</label>
            <input id="editQty" type="number" min="0" placeholder="Qty">

            <label for="editMemo">Item Memo</label>
            <textarea id="editMemo" placeholder="Notes"></textarea>

            <button onclick="saveEditedItem()">Save Changes</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
